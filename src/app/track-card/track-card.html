<article class="card" [class.active]="active()" (click)="select.emit(track())">
  <img [src]="track().coverUrl || 'https://picsum.photos/seed/' + track().id + '/300'" [alt]="track().title" />
  <h3>{{ track().title }}</h3>
  <p>{{ track().artist }}</p>

  <div class="meta">
    <span class="duration">⏱ {{ track().durationSeconds | duration }}</span>
    <span class="rating" [appRatingColor]="track().rating">★ {{ track().rating }}/10</span>
  </div>

  <span class="tier">
    @switch (tier()) {
      @case ('top') {
        🏆 Incontournable
      }
      @case ('good') {
        👍 Recommandé
      }
      @default {
        🎧 À écouter
      }
    }
  </span>

  @if (active()) {
    <span class="badge">▶ En lecture</span>
  }
</article>
