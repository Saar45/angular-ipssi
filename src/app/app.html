<div class="shell">
  <header class="header">
    <a class="brand" routerLink="/tracks">CinéTrack 🎵</a>
    <nav class="nav">
      <a routerLink="/tracks" routerLinkActive="active">Morceaux</a>
      @if (auth.isLoggedIn()) {
        <a routerLink="/playlists" routerLinkActive="active">Playlists</a>
        <a routerLink="/tracks/new" routerLinkActive="active">Ajouter</a>
        <span class="user">👤 {{ auth.user()?.name ?? 'Connecté' }}</span>
        <button class="ghost" (click)="logout()">Déconnexion</button>
      } @else {
        <a routerLink="/login" routerLinkActive="active">Connexion</a>
      }
    </nav>
  </header>

  @if (notifications.current(); as note) {
    <div class="notification" [class.error]="note.type === 'error'" [class.success]="note.type === 'success'">
      <span>{{ note.message }}</span>
      <button class="close" (click)="notifications.clear()">✕</button>
    </div>
  }

  <main class="content">
    <router-outlet />
  </main>
</div>
