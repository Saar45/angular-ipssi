<h1>Morceaux</h1>

<input
  class="search"
  type="search"
  placeholder="Rechercher un titre, un artiste, un album…"
  [value]="query()"
  (input)="query.set($any($event.target).value)" />

<p class="count">{{ tracks().length }} morceau(x)</p>

<app-track-list [tracks]="tracks()" (select)="openDetail($event)" />
