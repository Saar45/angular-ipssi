<h1>Mes favoris ❤️</h1>

<input
  class="search"
  type="search"
  placeholder="Rechercher dans les favoris…"
  [value]="query()"
  (input)="query.set($any($event.target).value)" />

<p class="count">{{ tracks().length }} favori(s)</p>

<app-track-list
  [tracks]="tracks()"
  [canFavorite]="true"
  (select)="openDetail($event)"
  (favoriteToggle)="onToggleFavorite($event)" />
