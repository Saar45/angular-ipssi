<section class="grid">
  @for (track of tracks(); track track.id) {
    <app-track-card
      [track]="track"
      [active]="track.id === selectedId()"
      [canFavorite]="canFavorite()"
      (select)="select.emit($event)"
      (favoriteToggle)="favoriteToggle.emit($event)" />
  } @empty {
    <p class="empty">Aucun morceau à afficher.</p>
  }
</section>
